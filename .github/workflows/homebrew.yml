name: Update Homebrew formula

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix, e.g. 0.1.0)'
        required: true

jobs:
  update-formula:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'v')) }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: anton-kochev/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          path: homebrew-tap

      - name: Resolve version
        id: ver
        env:
          EVENT_NAME: ${{ github.event_name }}
          DISPATCH_VERSION: ${{ inputs.version }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            VERSION="$DISPATCH_VERSION"
          else
            VERSION="${HEAD_BRANCH#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Download asset and compute sha256
        id: sha
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          URL="https://github.com/anton-kochev/invoice-generator/releases/download/v${V}/invoice-generator-v${V}-aarch64-apple-darwin.tar.gz"
          curl -fL "$URL" -o /tmp/invoice-generator.tar.gz
          echo "sha256=$(shasum -a 256 /tmp/invoice-generator.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Render formula
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha256 }}"
          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/invoice-generator.rb <<EOF
          class InvoiceGenerator < Formula
            desc "Invoice generator CLI"
            homepage "https://github.com/anton-kochev/invoice-generator"
            version "${V}"
            url "https://github.com/anton-kochev/invoice-generator/releases/download/v${V}/invoice-generator-v${V}-aarch64-apple-darwin.tar.gz"
            sha256 "${SHA}"

            depends_on arch: :arm64
            depends_on :macos

            def install
              bin.install "invoice-generator"
            end

            test do
              system "#{bin}/invoice-generator", "--version"
            end
          end
          EOF

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/invoice-generator.rb
          if git diff --cached --quiet; then
            echo "Formula already up to date"
          else
            git commit -m "Update invoice-generator to ${{ steps.ver.outputs.version }}"
            git push
          fi
